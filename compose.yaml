name: tide

services:
  app:
    build:
      context: .
      target: prod
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null 2>&1 || exit 1" ]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:2026.4.0
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:?CLOUDFLARE_TUNNEL_TOKEN is required}
    command: [ "tunnel", "--no-autoupdate", "run" ]
    profiles:
      - tunnel
